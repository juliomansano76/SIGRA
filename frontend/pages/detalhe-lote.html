<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Detalhe do Lote — SIGRA</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .secao { margin-bottom: 24px; }
        .secao-titulo { font-size: 13px; font-weight: 700; color: #666; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #eee; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
        /* Chat de dúvidas ao SAC */
        .chat-container { display:flex; flex-direction:column; gap:10px; max-height:360px; overflow-y:auto; padding:4px 0; margin-bottom:12px; }
        .chat-msg { display:flex; flex-direction:column; max-width:80%; }
        .chat-msg.minha  { align-self:flex-end; align-items:flex-end; }
        .chat-msg.deles  { align-self:flex-start; align-items:flex-start; }
        .chat-msg.sac    { align-self:flex-start; align-items:flex-start; }
        .chat-balao { padding:10px 14px; border-radius:12px; font-size:13px; line-height:1.5; }
        .chat-msg.minha  .chat-balao { background:#1a237e; color:#fff; border-bottom-right-radius:3px; }
        .chat-msg.deles  .chat-balao { background:#f0f0f0; color:#333; border-bottom-left-radius:3px; }
        .chat-msg.sac    .chat-balao { background:#e8f5e9; color:#1b5e20; border-bottom-left-radius:3px; }
        .chat-meta { font-size:11px; color:#999; margin-top:3px; }
        .chat-input-area { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
        .chat-input-area textarea { width:100%; box-sizing:border-box; border:1px solid #ddd; border-radius:8px; padding:10px 12px; font-size:13px; font-family:inherit; resize:vertical; outline:none; min-height:70px; }
        .chat-input-area textarea:focus { border-color:#1a237e; }
        .chat-input-area button { align-self:flex-end; }
        .info-item label { display: block; font-size: 11px; font-weight: 600; color: #999; text-transform: uppercase; margin-bottom: 4px; }
        .info-item span  { font-size: 14px; color: #333; }
        .historico-linha { display: flex; gap: 12px; padding: 10px 0; border-bottom: 1px solid #f5f5f5; font-size: 13px; }
        .historico-linha:last-child { border: none; }
        .historico-data { color: #999; white-space: nowrap; min-width: 140px; }
        .etapa-ativa { border: 2px solid #2c2c2c !important; }
        .etapa-concluida { border-left: 4px solid #2e7d32 !important; }
        .etapa-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .upload-area { border: 2px dashed #ddd; border-radius: 8px; padding: 14px; text-align: center; cursor: pointer; font-size: 13px; color: #666; margin-top: 12px; transition: border 0.2s; }
        .upload-area:hover { border-color: #2c2c2c; }
        .rodape-fixo { position: fixed; bottom: 0; left: 240px; right: 0; background: white; border-top: 1px solid #eee; padding: 12px 32px; display: flex; gap: 8px; align-items: center; z-index: 50; }
        .rodape-fixo .btn { height: 36px; padding: 0 16px; border-radius: 6px; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; gap: 6px; cursor: pointer; transition: all 0.2s; white-space: nowrap; border: none; width: auto; }
        .rodape-fixo .btn-voltar-pg { background: #fff; color: #4a5568; border: 1px solid #cbd5e0 !important; flex-shrink: 0; }
        .rodape-fixo .btn-secondary { background: #4a5568; color: white; flex-shrink: 0; }
        .rodape-fixo .btn-primary, .rodape-fixo .btn-success { background: #2f855a; color: white; flex: 1; }
        .info-resultado { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .info-resultado.procedente   { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .info-resultado.improcedente { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .info-resultado.neutro       { background: #f5f5f5; color: #555; border: 1px solid #ddd; }
        .radio-group { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
        .radio-item { display: flex; align-items: center; gap: 8px; font-size: 14px; padding: 10px 16px; border: 2px solid #eee; border-radius: 8px; cursor: pointer; transition: all 0.15s; }
        .radio-item:hover { border-color: #2c2c2c; }
        .radio-item input { width: 16px; height: 16px; cursor: pointer; }
        .plano-acao-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:8px; }
        .plano-acao-table th { background:#f5f5f5; padding:8px 10px; text-align:left; font-weight:600; color:#555; border:1px solid #e0e0e0; font-size:12px; }
        .plano-acao-table td { padding:6px 8px; border:1px solid #e0e0e0; vertical-align:top; }
        .cotacoes-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:8px; }
        .cotacoes-table th { background:#f5f5f5; padding:8px 10px; text-align:left; font-weight:600; color:#555; border:1px solid #e0e0e0; font-size:12px; }
        .cotacoes-table td { padding:6px 8px; border:1px solid #e0e0e0; vertical-align:top; }
        .cotacoes-table input { width:100%; border:none; background:transparent; font-size:13px; font-family:inherit; outline:none; padding:2px 4px; }
        .btn-add-linha { font-size:12px; color:#2f855a; background:none; border:1px dashed #2f855a; border-radius:6px; padding:4px 12px; cursor:pointer; margin-top:8px; }
        .btn-del-linha { background:none; border:none; color:#c62828; cursor:pointer; font-size:14px; padding:2px 6px; }
        /* Tabela de NFs */
        .nf-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:8px; }
        .nf-table th { background:#f5f5f5; padding:8px 10px; text-align:left; font-weight:600; color:#555; border:1px solid #e0e0e0; font-size:12px; }
        .nf-table td { padding:4px 6px; border:1px solid #e0e0e0; vertical-align:middle; }
        .nf-table input { width:100%; border:none; background:transparent; font-size:13px; font-family:inherit; outline:none; padding:2px 4px; }
        .nf-table input:focus { background:#f9f9f9; border-radius:3px; }
        .nf-table input[type=number] { text-align:right; }
        .nf-totais { display:flex; gap:24px; margin-top:10px; padding:10px 14px; background:#e8eaf6; border-radius:8px; font-size:13px; }
        .nf-totais span { color:#1a237e; font-weight:700; }
        .nf-totais label { color:#555; font-size:12px; margin-right:4px; }
        /* Bloco de reclamações do lote */
        .rec-lote-item { display:flex; align-items:center; gap:12px; padding:8px 12px; border:1px solid #e8eaf6; border-radius:8px; margin-bottom:6px; font-size:13px; }
        .rec-lote-codigo { font-weight:700; color:#1a237e; min-width:90px; }
        .rec-lote-info { color:#555; flex:1; }
    </style>
</head>
<body>
<div class="layout">
    <div id="sidebar-container"></div>
    <div class="conteudo" style="padding-bottom:90px;">

        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
            <div>
                <a href="/pages/reclamacoes.html" style="color:#666;font-size:13px;text-decoration:none;">← Voltar para Reclamações</a>
                <h2 class="pagina-titulo" style="margin:4px 0 0;" id="titulo-pagina">Carregando...</h2>
            </div>
            <span id="badge-status" class="badge"></span>
        </div>

        <!-- Dados do Lote -->
        <div class="card secao">
            <div class="secao-titulo">📦 Dados do Lote de Devolução</div>
            <div class="grid-3" style="margin-bottom:16px;">
                <div class="info-item"><label>Criado por</label><span id="info-criado-por">—</span></div>
                <div class="info-item"><label>Criado em</label><span id="info-criado-em">—</span></div>
                <div class="info-item"><label>Total de Reclamações</label><span id="info-total-recs">—</span></div>
            </div>
            <!-- Lista de reclamações do lote -->
            <div class="secao-titulo" style="margin-top:8px;">Reclamações agrupadas</div>
            <div id="lista-recs-lote"></div>
        </div>

        <!-- Histórico / Linha do Tempo -->
        <div id="linha-do-tempo"></div>

        <!-- Etapa Ativa -->
        <div id="secao-etapa-atual"></div>

        <!-- Chat de Dúvidas ao SAC -->
        <div class="card secao" id="bloco-chat" style="display:none">
            <div class="secao-titulo">💬 Dúvidas ao SAC</div>
            <div class="chat-container" id="chat-msgs">
                <p style="color:#999;font-size:13px;text-align:center">Nenhuma mensagem ainda.</p>
            </div>
            <div class="chat-input-area">
                <textarea id="chat-texto" rows="2" placeholder="Digite sua dúvida ou resposta..."></textarea>
                <button class="btn btn-primary" onclick="chatEnviar()">Enviar</button>
            </div>
        </div>

        <!-- Histórico de Movimentações (do lote via reclamações) -->
        <div class="card secao">
            <div class="secao-titulo">📅 Histórico de Movimentações</div>
            <div id="historico-lista"><p style="color:#999;font-size:13px;">Nenhuma movimentação registrada.</p></div>
        </div>
    </div>
</div>

<div class="rodape-fixo" id="rodape-acoes" style="display:none;"></div>

<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
    carregarSidebar();
    const params = new URLSearchParams(window.location.search);
    const loteId = params.get('id');
    if (!loteId) window.location.href = '/pages/reclamacoes.html';

    let lote = null;

    const statusLabel = {
        encaminhando_devolucao_sac:                          'SAC — Verificando NF',
        encaminhando_devolucao_conferindo_nf_fiscal:         'Fiscal — Conferindo NF',
        encaminhando_devolucao_sac_solicitar_coleta:         'SAC — Solicitando Coleta',
        encaminhando_devolucao_aguardando_chegada_material:  'Ag. Chegada do Material',
        encaminhando_devolucao_aguardando_revisao:           'Revisão — Aguardando',
        encaminhando_devolucao_aguardando_conferencia_material: 'Fiscal — Conferindo Material',
        encaminhando_devolucao_aguardando_of:                'PCP — Aguardando OF',
        encaminhando_devolucao_aguardando_correcao_nf_cliente: 'SAC — Corrigindo NF',
        concluido:                                           'Concluído',
    };

    function fmt(dt)  { return dt ? new Date(dt).toLocaleString('pt-BR') : '—'; }
    function fmtD(dt) { if (!dt) return '—'; const d = dt.includes('T') ? new Date(dt) : new Date(dt+'T00:00:00'); return d.toLocaleDateString('pt-BR'); }
    function fmtM(v)  { if (v === null || v === undefined || v === '') return '—'; const n = parseFloat(v); if (isNaN(n)) return '—'; return n.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' m'; }

    function badgeCor(s) {
        if (s === 'concluido') return 'badge-verde';
        return 'badge-azul';
    }

    async function carregar() {
        const r = await api('GET', '/reclamacoes/lotes/' + loteId);
        if (!r.ok) { alert('Erro ao carregar lote.'); return; }
        lote = r.dados.dados; // duplo unwrap pelo helper api()
        renderizar();
    }

    function renderizar() {
        const lt = lote;
        const usuario = getUsuario();
        const perfil = usuario.perfil;
        const status = lt.status;
        const loteCod = 'LOTE-' + String(lt.codigo).padStart(6, '0');

        // Cabeçalho
        document.getElementById('titulo-pagina').textContent = loteCod;
        const bEl = document.getElementById('badge-status');
        bEl.textContent = statusLabel[status] || status;
        bEl.className = 'badge ' + badgeCor(status);

        // Dados básicos
        document.getElementById('info-criado-por').textContent = lt.criado_por_nome || '—';
        document.getElementById('info-criado-em').textContent = fmt(lt.criado_em);
        document.getElementById('info-total-recs').textContent = (lt.reclamacoes || []).length;

        // Lista de reclamações
        const listaEl = document.getElementById('lista-recs-lote');
        if (lt.reclamacoes && lt.reclamacoes.length) {
            listaEl.innerHTML = lt.reclamacoes.map(rec => {
                const cod = 'REC-' + String(rec.codigo).padStart(6, '0');
                return `<div class="rec-lote-item">
                    <span class="rec-lote-codigo">${cod}</span>
                    <span class="rec-lote-info">${rec.cliente_nome || '—'} — NF: ${rec.nossa_nf || '—'} — ${rec.artigo || '—'}</span>
                    <a href="/pages/detalhe-reclamacao.html?id=${rec.id}" target="_blank"
                       style="font-size:11px;color:#1a237e;text-decoration:none;border:1px solid #c5cae9;border-radius:4px;padding:2px 8px;">Ver →</a>
                </div>`;
            }).join('');
        } else {
            listaEl.innerHTML = '<p style="color:#999;font-size:13px;">Nenhuma reclamação vinculada.</p>';
        }

        // Histórico
        renderHistorico(lt);

        // Linha do tempo (blocos concluídos)
        renderLinhaTempo(lt);

        // Etapa ativa
        renderEtapaAtual(lt, perfil, status);

        // Chat de dúvidas ao SAC — sempre visível exceto se concluído
        if (status !== 'concluido') {
            document.getElementById('bloco-chat').style.display = 'block';
            chatCarregar();
        }
    }

    function renderHistorico(lt) {
        const historico = lt.historico || [];
        const el = document.getElementById('historico-lista');
        if (!historico.length) {
            el.innerHTML = '<p style="color:#999;font-size:13px;">Nenhuma movimentação registrada.</p>';
            return;
        }
        el.innerHTML = historico.map(h => `
            <div class="historico-linha">
                <span class="historico-data">${fmt(h.criado_em)}</span>
                <span><strong>${h.usuario_nome || 'Sistema'}</strong> — ${h.observacao || ''}</span>
            </div>`).join('');
    }

    function renderLinhaTempo(lt) {
        let html = '';

        const ordemStatus = [
            'encaminhando_devolucao_sac',
            'encaminhando_devolucao_conferindo_nf',
            'encaminhando_devolucao_conferindo_nf_fiscal',
            'encaminhando_devolucao_sac_solicitar_coleta',
            'encaminhando_devolucao_aguardando_chegada_material',
            'encaminhando_devolucao_aguardando_revisao',
            'encaminhando_devolucao_aguardando_conferencia_material',
            'encaminhando_devolucao_aguardando_of',
            'gerando_credito_sac',
            'aguardando_aprovacao_financeiro',
            'aguardando_encerramento_comercial',
            'concluido'
        ];
        const idxAtual = ordemStatus.indexOf(lt.status);
        const passou = (s) => ordemStatus.indexOf(s) < idxAtual;

        // ── ETAPA 1: NFs de despacho ──────────────────────────────
        if (passou('encaminhando_devolucao_sac')) {
            let nfsArr = [];
            try { nfsArr = lt.nfs_despacho ? JSON.parse(lt.nfs_despacho) : []; } catch(e) {}
            html += `<div class="card secao etapa-concluida">
                <div class="etapa-header">
                    <div class="secao-titulo" style="margin:0">📋 Etapa 1 — NFs de Despacho (SAC)</div>
                    <span class="badge badge-verde">Concluído</span>
                </div>
                ${nfsArr.length ? `<table class="nf-table" style="margin-bottom:10px">
                    <thead><tr><th>Nº NF</th><th style="text-align:right">Metragem</th><th style="text-align:right">Volumes</th><th style="text-align:right">Peso</th><th style="text-align:right">Valor NF</th></tr></thead>
                    <tbody>${nfsArr.map(n=>`<tr>
                        <td>${n.numero_nf||'—'}</td>
                        <td style="text-align:right">${fmtM(n.metragem)}</td>
                        <td style="text-align:right">${n.volumes||'—'}</td>
                        <td style="text-align:right">${n.peso ? parseFloat(n.peso).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2})+' kg' : '—'}</td>
                        <td style="text-align:right">${n.valor_nf ? 'R$ '+parseFloat(n.valor_nf).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}) : '—'}</td>
                    </tr>`).join('')}</tbody>
                </table>` : ''}
                <div class="grid-2">
                    <div class="info-item"><label>Total Metragem</label><span>${fmtM(lt.quantidade_confirmada)}</span></div>
                    <div class="info-item"><label>Transportadora Escolhida</label><span>${lt.transportadora||'—'}</span></div>
                </div>
                ${lt.observacoes_nf?`<div class="info-item" style="margin-top:8px"><label>Observações</label><span>${lt.observacoes_nf}</span></div>`:''}
            </div>`;
        }

        // ── ETAPA 2: NFs de devolução do cliente ─────────────────
        if (passou('encaminhando_devolucao_conferindo_nf')) {
            let nfsCliente = [];
            try { nfsCliente = lt.nfs_cliente_urls ? JSON.parse(lt.nfs_cliente_urls) : []; } catch(e) {}
            html += `<div class="card secao etapa-concluida">
                <div class="etapa-header">
                    <div class="secao-titulo" style="margin:0">📄 Etapa 2 — NFs de Devolução do Cliente (SAC)</div>
                    <span class="badge badge-verde">Concluído</span>
                </div>
                ${nfsCliente.length
                    ? `<div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:4px">${nfsCliente.map(nf=>`<a href="${nf.url}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#e8eaf6;border-radius:6px;color:#1a237e;text-decoration:none;font-size:12px;font-weight:600">📄 ${nf.nome}</a>`).join('')}</div>`
                    : '<span style="color:#999;font-size:13px">Nenhuma NF anexada.</span>'}
            </div>`;
        }

        // ── ETAPA 3: Conferência fiscal ───────────────────────────
        if (passou('encaminhando_devolucao_conferindo_nf_fiscal')) {
            const aprovado = lt.status !== 'encaminhando_devolucao_conferindo_nf'; // voltou = reprovado na etapa anterior
            // Usamos observacoes_nf para guardar o motivo de reprovação fiscal
            html += `<div class="card secao etapa-concluida">
                <div class="etapa-header">
                    <div class="secao-titulo" style="margin:0">🔍 Etapa 3 — Conferência Fiscal das NFs (Fiscal)</div>
                    <span class="badge badge-verde">Aprovado</span>
                </div>
                <div class="info-resultado procedente">✅ NFs de devolução aprovadas pelo Fiscal.</div>
            </div>`;
        }

        // ── ETAPA 4: Coleta solicitada ────────────────────────────
        if (passou('encaminhando_devolucao_sac_solicitar_coleta')) {
            html += `<div class="card secao etapa-concluida">
                <div class="etapa-header">
                    <div class="secao-titulo" style="margin:0">🚛 Etapa 4 — Coleta Solicitada (SAC)</div>
                    <span class="badge badge-verde">Concluído</span>
                </div>
                <div class="grid-3">
                    <div class="info-item"><label>Transportadora</label><span>${lt.transportadora||'—'}</span></div>
                    <div class="info-item"><label>Data da Coleta</label><span>${fmtD(lt.data_coleta)}</span></div>
                    <div class="info-item"><label>Previsão de Chegada</label><span>${fmtD(lt.data_prevista_chegada)}</span></div>
                </div>
            </div>`;
        }

        // ── ETAPA 5: Material recebido pela Expedição ─────────────
        if (passou('encaminhando_devolucao_aguardando_chegada_material')) {
            html += `<div class="card secao etapa-concluida">
                <div class="etapa-header">
                    <div class="secao-titulo" style="margin:0">📥 Etapa 5 — Material Recebido (Expedição)</div>
                    <span class="badge badge-verde">Concluído</span>
                </div>
                <div class="info-resultado procedente" style="margin:0">✅ Material recebido pela expedição.</div>
            </div>`;
        }

        // ── ETAPA 6: Revisão ──────────────────────────────────────
        if (passou('encaminhando_devolucao_aguardando_revisao')) {
            const itensRev = lt.romaneio_itens || [];
            const totalMetros = itensRev.reduce((s, it) => s + (parseFloat(it.metros)||0), 0);
            const tabelaItens = itensRev.length ? `
                <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:10px">
                    <thead><tr style="background:#f5f5f5">
                        <th style="padding:6px 8px;text-align:center;border:1px solid #e0e0e0;width:5%">#</th>
                        <th style="padding:6px 8px;text-align:left;border:1px solid #e0e0e0;width:20%">NF</th>
                        <th style="padding:6px 8px;text-align:left;border:1px solid #e0e0e0">Artigo</th>
                        <th style="padding:6px 8px;text-align:left;border:1px solid #e0e0e0;width:18%">Qualidade</th>
                        <th style="padding:6px 8px;text-align:right;border:1px solid #e0e0e0;width:14%">Metros</th>
                    </tr></thead>
                    <tbody>${itensRev.map((it,i)=>`<tr>
                        <td style="padding:5px 8px;border:1px solid #e0e0e0;text-align:center;color:#999">${i+1}</td>
                        <td style="padding:5px 8px;border:1px solid #e0e0e0">${it.numero_nf||'—'}</td>
                        <td style="padding:5px 8px;border:1px solid #e0e0e0">${it.codigo_produto||'—'}</td>
                        <td style="padding:5px 8px;border:1px solid #e0e0e0">${it.qualidade||'—'}</td>
                        <td style="padding:5px 8px;border:1px solid #e0e0e0;text-align:right">${fmtM(it.metros)}</td>
                    </tr>`).join('')}</tbody>
                    <tfoot><tr style="background:#e8f5e9;font-weight:700">
                        <td colspan="4" style="padding:6px 8px;border:1px solid #e0e0e0">Total</td>
                        <td style="padding:6px 8px;border:1px solid #e0e0e0;text-align:right">${fmtM(totalMetros)}</td>
                    </tr></tfoot>
                </table>` : '<p style="color:#999;font-size:13px;margin-top:6px">Nenhum item revisado.</p>';

            html += `<div class="card secao etapa-concluida">
                <div class="etapa-header">
                    <div class="secao-titulo" style="margin:0">🧵 Etapa 6 — Revisão do Material</div>
                    <span class="badge badge-verde">Concluído</span>
                </div>
                ${tabelaItens}
            </div>`;
        }

        // ── ETAPA 8: PCP emitiu OF ────────────────────────────────
        if (passou('encaminhando_devolucao_aguardando_of')) {
            html += `<div class="card secao etapa-concluida">
                <div class="etapa-header">
                    <div class="secao-titulo" style="margin:0">⚙️ Etapa 8 — Ordem de Fabricação (PCP)</div>

            </div>`;
        }

        // ── ETAPA 9: Crédito — SAC definiu forma ─────────────────
        if (passou('gerando_credito_sac')) {
            const formaLabel = { boleto_cancelado: '❌ Cancelar Boleto', desconto_boleto: '💳 Abater em Outro Boleto', outro: '📝 Outros' };
            html += `<div class="card secao etapa-concluida">
                <div class="etapa-header">
                    <div class="secao-titulo" style="margin:0">💰 Etapa 9 — Definição de Crédito (SAC)</div>
                    <span class="badge badge-verde">Concluído</span>
                </div>
                <div class="grid-2">
                    <div class="info-item"><label>Valor do Crédito</label><span>R$ ${lt.valor_credito?parseFloat(lt.valor_credito).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—'}</span></div>
                    <div class="info-item"><label>Forma</label><span>${formaLabel[lt.tipo_credito]||lt.tipo_credito||'—'}</span></div>
                    ${lt.contato_cliente?`<div class="info-item"><label>Contato no Cliente</label><span>${lt.contato_cliente}</span></div>`:''}
                </div>
                ${lt.descricao_credito?`<div class="info-item" style="margin-top:6px"><label>O que foi tratado com o cliente</label><span>${lt.descricao_credito}</span></div>`:''}
            </div>`;
        }

        // ── ETAPA 10: Financeiro tomou ciência ────────────────────
        if (passou('aguardando_aprovacao_financeiro')) {
            html += `<div class="card secao etapa-concluida">
                <div class="etapa-header">
                    <div class="secao-titulo" style="margin:0">💰 Etapa 10 — Ciência do Crédito (Financeiro)</div>
                    <span class="badge badge-verde">Concluído</span>
                </div>
                <div class="info-resultado procedente">✅ Financeiro confirmou ciência do crédito.</div>
            </div>`;
        }

        // ── Concluído ─────────────────────────────────────────────
        if (lt.status === 'concluido') {
            html += `<div class="card secao" style="background:#e8f5e9;border:none;">
                <div class="secao-titulo">✅ Lote Concluído</div>
                <p style="color:#555;font-size:13px">Encerrado em ${fmt(lt.concluido_em||lt.atualizado_em)}.</p>
            </div>`;
        }

        document.getElementById('linha-do-tempo').innerHTML = html || '';
    }

    function renderEtapaAtual(lt, perfil, status) {

            nfRecalcular();
        }

        // ===== ETAPA 2: SAC — Upload das NFs de devolução do cliente =====
        else if (status === 'encaminhando_devolucao_conferindo_nf' && ['admin', 'sac'].includes(perfil)) {
            // Montar lista de NFs já enviadas (salvas no campo nfs_cliente_urls como JSON)
            let nfsClienteExistentes = [];
            try { nfsClienteExistentes = lt.nfs_cliente_urls ? JSON.parse(lt.nfs_cliente_urls) : []; } catch(e) {}

            secao.innerHTML = `<div class="card secao etapa-ativa">
                <div class="secao-titulo">Etapa 2 — NFs de Devolução do Cliente</div>
                <div class="info-resultado neutro">
                    Transportadora escolhida: <strong>${lt.transportadora || '—'}</strong> &nbsp;|&nbsp;
                    Total: <strong>${fmtM(lt.quantidade_confirmada)}</strong><br>
                    <small>O cliente foi informado. Aguarde ele emitir as NFs de devolução e faça o upload abaixo.</small>
                </div>

                <div class="campo">
                    <label>NFs de Devolução do Cliente *</label>
                    <div id="nfs-cliente-lista" style="display:flex;flex-direction:column;gap:8px;margin-bottom:12px">
                        ${nfsClienteExistentes.map((nf,i) => `
                        <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f5f5f5;border-radius:6px;font-size:13px" id="nfc-item-${i}">

                        </div>`).join('')}
                    </div>
                    <div class="upload-area" onclick="document.getElementById('nfc-file').click()" id="nfc-upload-area"
                         style="border:2px dashed #9fa8da;border-radius:8px;padding:20px;text-align:center;cursor:pointer;color:#3949ab">
                        <input type="file" id="nfc-file" accept=".pdf,image/*" multiple style="display:none" onchange="nfClienteUpload(this)" />
                        <div>📎 Clique para adicionar NF(s) de devolução</div>

            rodape.style.display = 'flex';
            rodape.innerHTML = `${btn}${btnVoltarEtapa('encaminhando_devolucao_sac', perfil)}<button class="btn btn-primary" onclick="enviarNFsParaFiscal()">✅ Enviar para Fiscal Conferir</button>`;
        }

        // ===== ETAPA 3: Fiscal — Conferir NFs de devolução =====
        else if (status === 'encaminhando_devolucao_conferindo_nf_fiscal' && ['admin', 'fiscal'].includes(perfil)) {
            let nfsClienteExistentes = [];
            try { nfsClienteExistentes = lt.nfs_cliente_urls ? JSON.parse(lt.nfs_cliente_urls) : []; } catch(e) {}
            const linksNFs = nfsClienteExistentes.length
                ? nfsClienteExistentes.map(nf => `<a href="${nf.url}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#e8eaf6;border-radius:6px;color:#1a237e;text-decoration:none;font-size:12px;font-weight:600">📄 ${nf.nome}</a>`).join(' ')
                : '<span style="color:#c62828">Nenhuma NF anexada pelo SAC.</span>';

            secao.innerHTML = `<div class="card secao etapa-ativa">
                <div class="secao-titulo">Etapa 3 — Conferência Fiscal das NFs de Devolução</div>
                <div class="info-resultado neutro">Confira os aspectos fiscais das NFs de devolução emitidas pelo cliente (CFOP, CST, dados do emitente, etc).</div>

                    <label>NFs para conferir</label>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">${linksNFs}</div>

                <div class="campo" style="margin-top:16px">
                    <label>As NFs estão fiscalmente corretas? *</label>
                    <div class="radio-group" style="margin-top:8px">

                            <input type="radio" name="nf-ok" value="true" /> ✅ Sim, NFs aprovadas
                        </label>
                        <label class="radio-item" onclick="fiscalToggle(false)">
                            <input type="radio" name="nf-ok" value="false" /> ❌ Não, há problema fiscal
                        </label>
                    </div>

                <div id="fiscal-campo-problema" style="display:none">
                    <div class="campo">
                        <label>Descreva o problema fiscal encontrado *</label>
                        <textarea id="nf-descricao" rows="4" placeholder="Ex: CFOP incorreto (deveria ser 5201), CST divergente, dados do emitente incorretos..."></textarea>
                    </div>
                </div>
            </div>`;
            rodape.style.display = 'flex';
            rodape.innerHTML = `${btn}${btnVoltarEtapa('encaminhando_devolucao_conferindo_nf', perfil)}<button class="btn btn-primary" onclick="concluirConferenciaNF()">✅ Confirmar Conferência</button>`;
        }

        // ===== ETAPA 4: SAC — Solicitar coleta =====
        else if (status === 'encaminhando_devolucao_sac_solicitar_coleta' && ['admin', 'sac'].includes(perfil)) {
            // NFs de devolução já conferidas pelo fiscal
            let nfsCliente = [];
            try { nfsCliente = lt.nfs_cliente_urls ? JSON.parse(lt.nfs_cliente_urls) : []; } catch(e) {}
            const linksNFs = nfsCliente.length
                ? nfsCliente.map(nf => `<a href="${nf.url}" target="_blank" style="display:inline-flex;align-items:center;gap:6px;padding:5px 10px;background:#e8eaf6;border-radius:6px;color:#1a237e;text-decoration:none;font-size:12px;font-weight:600">📄 ${nf.nome}</a>`).join(' ')
                : '—';

            secao.innerHTML = `<div class="card secao etapa-ativa">
                <div class="secao-titulo">Etapa 4 — Solicitar Coleta</div>
                <div class="info-resultado procedente">✅ NFs aprovadas pelo Fiscal. Solicite a coleta do material.</div>

                <div class="grid-2" style="margin-bottom:12px">
                    <div class="info-item"><label>Transportadora</label><span style="font-weight:600">${lt.transportadora||'—'}</span></div>
                    <div class="info-item"><label>Total Metragem</label><span>${fmtM(lt.quantidade_confirmada)}</span></div>
                </div>
                <div class="info-item" style="margin-bottom:16px">
                    <label>NFs de Devolução do Cliente (já conferidas)</label>
                    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">${linksNFs}</div>
                </div>

                <div class="grid-2">
                    <div class="campo"><label>Data da Coleta *</label>
                        <input type="date" id="col-data" value="${lt.data_coleta ? lt.data_coleta.substring(0,10) : ''}" /></div>
                    <div class="campo"><label>Data Prevista de Chegada</label>

        // ===== ETAPA 5: Expedição — Receber material =====

                    ${lt.transportadora ? ` — Transportadora: ${lt.transportadora}` : ''}
                    ${lt.nf_coleta ? ` — NF Coleta: ${lt.nf_coleta}` : ''}
                </div>

                    <input type="date" id="rec-data" value="${new Date().toISOString().split('T')[0]}" />

                <div class="campo"><label>Observacoes</label>
                    <textarea id="rec-obs" rows="3" placeholder="Ex: Material recebido com avaria..."></textarea>

            </div>`;
            rodape.style.display = 'flex';
            rodape.innerHTML = `${btn}<button class="btn btn-primary" onclick="receberMaterial()">✅ Confirmar Recebimento</button>`;
        }

        // ===== ETAPA 6: Revisão — Revisar material e romaneio =====
        else if (status === 'encaminhando_devolucao_aguardando_revisao' && ['admin', 'revisao'].includes(perfil)) {
            secao.innerHTML = `<div class="card secao etapa-ativa">
                <div class="secao-titulo">Etapa 6 — Revisão do Material</div>
                <div class="info-resultado neutro">Material recebido. Revise, gere o romaneio e encaminhe ao Fiscal.</div>
                <div class="campo"><label>Revisora *</label>
                    <input type="text" id="rv-revisora" value="" placeholder="Nome da revisora responsável..." />
                </div>
                <div class="campo"><label>Observações da Revisão</label>
                    <textarea id="rv-descricao" rows="2" placeholder="Anotações sobre o material revisado..."></textarea>
                </div>
                <div class="campo">
                    <label>Romaneio de Itens *</label>
                    <table class="plano-acao-table" id="rv-tabela">
                        <thead><tr>
                            <th style="width:4%;text-align:center">#</th>
                            <th style="width:16%">NF</th>

                    <button class="btn-add-linha" onclick="rvAdicionarLinha()" style="margin-top:8px">+ Nova linha</button>

                </div>

            rvRenumerar();
        }

        // ===== ETAPA 7: Fiscal — Conferência NF x Romaneio =====
        else if (status === 'encaminhando_devolucao_aguardando_conferencia_material' && ['admin', 'fiscal'].includes(perfil)) {
            // NFs do cliente (Etapa 2)
            let nfsCliente = [];
            try { nfsCliente = lt.nfs_cliente_urls ? JSON.parse(lt.nfs_cliente_urls) : []; } catch(e) {}

                ? nfsCliente.map(nf => `<a href="${nf.url}" target="_blank"
                    style="display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:#e8eaf6;border-radius:6px;color:#1a237e;text-decoration:none;font-size:12px;font-weight:600">
                    📄 ${nf.nome}</a>`).join(' ')
                : '<span style="color:#c62828;font-size:13px">Nenhuma NF anexada pelo SAC.</span>';

            // Romaneio agrupado: NF → Artigo → soma metros
            const itens = lt.romaneio_itens || [];
            const grupoNF = {};
            itens.forEach(it => {
                const nf  = it.numero_nf  || '(sem NF)';
                const art = it.codigo_produto || '(sem artigo)';
                const m   = parseFloat(it.metros) || 0;
                if (!grupoNF[nf]) grupoNF[nf] = { artigos: {}, totalNF: 0 };
                if (!grupoNF[nf].artigos[art]) grupoNF[nf].artigos[art] = { metros: 0, qualidades: [] };
                grupoNF[nf].artigos[art].metros += m;
                grupoNF[nf].totalNF += m;
                if (it.qualidade && !grupoNF[nf].artigos[art].qualidades.includes(it.qualidade))
                    grupoNF[nf].artigos[art].qualidades.push(it.qualidade);
            });

            let resumoHtml = '';
            let totalGeral = 0;
            Object.entries(grupoNF).forEach(([nf, dados]) => {
                resumoHtml += `<tr style="background:#e8eaf6">

                Object.entries(dados.artigos).forEach(([art, info]) => {

                        <td style="padding:4px 10px 4px 24px;color:#555">${art}</td>
                        <td style="padding:4px 10px;color:#777;font-size:12px">${info.qualidades.join(', ')||'—'}</td>
                        <td style="padding:4px 10px;text-align:right">${fmtM(info.metros)}</td>
                        <td></td>
                    </tr>`;
                });
                totalGeral += dados.totalNF;
            });

            const tabelaRomaneio = itens.length ? `
                <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;border:1px solid #e0e0e0;border-radius:6px;overflow:hidden">
                    <thead><tr style="background:#f5f5f5">
                        <th style="padding:8px 10px;text-align:left;font-weight:600;color:#555">Artigo</th>
                        <th style="padding:8px 10px;text-align:left;font-weight:600;color:#555">Qualidade</th>
                        <th style="padding:8px 10px;text-align:right;font-weight:600;color:#555">Metros</th>
                        <th style="padding:8px 10px;text-align:right;font-weight:600;color:#555">Subtotal NF</th>
                    </thead>
                    <tbody>${resumoHtml}</tbody>
                    <tfoot><tr style="background:#2e7d32;color:#fff">
                        <td colspan="2" style="padding:8px 10px;font-weight:700">TOTAL GERAL</td>
                        <td style="padding:8px 10px;text-align:right;font-weight:700">${fmtM(totalGeral)}</td>
                        <td></td>
                    </tr></tfoot>
                </table>` : '<p style="color:#999;font-size:13px">Nenhum item no romaneio.</p>';

            secao.innerHTML = `<div class="card secao etapa-ativa">
                <div class="secao-titulo">Etapa 7 — Conferência NF × Romaneio (Fiscal)</div>
                <div class="info-resultado neutro">Compare as NFs de devolução do cliente com o romaneio da revisão. Após aprovar, informe o valor do crédito a ser gerado.</div>

                <div class="campo">
                    <label>📄 NFs de Devolução do Cliente</label>
                    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:8px">${linksNFs}</div>
                </div>

                <div class="campo" style="margin-top:16px">
                    <label>🧵 Resumo do Romaneio (por NF → por Artigo)</label>
                    ${tabelaRomaneio}
                </div>

                <div class="campo" style="margin-top:20px">
                    <label>O romaneio confere com as NFs? *</label>
                    <div class="radio-group" style="margin-top:8px">
                        <label class="radio-item" onclick="toggleConfNF(true)">
                            <input type="radio" name="conf-nf" value="true" id="conf-ok" /> ✅ Aprovado
                        </label>
                        <label class="radio-item" onclick="toggleConfNF(false)">
                            <input type="radio" name="conf-nf" value="false" id="conf-nok" /> ❌ Reprovado
                        </label>
                    </div>
                </div>
                <div id="conf-campo-credito" style="display:none">
                    <div class="campo"><label>Valor do Crédito (R$) * <small style="color:#555;font-weight:400">— informado pelo Fiscal após dar entrada no ERP</small></label>

                    <div class="campo"><label>Observações do Fiscal</label>

                <div id="conf-campo-problema" style="display:none">
