            rodape.style.display = 'flex';
            rodape.innerHTML = `${btn}${btnVoltarEtapa('encaminhando_devolucao_aguardando_revisao', perfil)}<button class="btn btn-primary" onclick="concluirConferenciaMaterial()">✅ Confirmar Conferência</button>`;
        }

        // ===== ETAPA 7b: SAC — Corrigir NF com cliente (se fiscal reprovou) =====
        else if (status === 'encaminhando_devolucao_aguardando_correcao_nf_cliente' && ['admin', 'sac'].includes(perfil)) {
            secao.innerHTML = `<div class="card secao etapa-ativa">
                <div class="secao-titulo">Etapa 7b — Corrigir NF com Cliente (SAC)</div>
                <div class="info-resultado" style="background:#fff3e0;border-left:4px solid #e65c00;padding:10px 14px;border-radius:6px;margin-bottom:16px;font-size:13px">
                    ⚠️ O Fiscal reprovou o romaneio. Corrija com o cliente e reenvie.
                </div>
                <div class="campo"><label>Descrição / Observações *</label>
                    <textarea id="div-obs" rows="3" placeholder="Detalhes do alinhamento com o cliente..."></textarea>
                </div>
            </div>`;
            rodape.style.display = 'flex';
            rodape.innerHTML = `${btn}<button class="btn btn-primary" onclick="reenviarParaConferencia()">✅ Reenviar para Fiscal</button>`;
        }

        // ===== ETAPA 8: PCP — Emitir OF =====
        else if (status === 'encaminhando_devolucao_aguardando_of' && ['admin', 'pcp'].includes(perfil)) {
            const itens = lt.romaneio_itens || [];

            // Agrupa por artigo → soma metros
            const porArtigo = {};
            itens.forEach(it => {
                const art = it.codigo_produto || '(sem artigo)';
                if (!porArtigo[art]) porArtigo[art] = { metros: 0, pecas: 0 };
                porArtigo[art].metros += parseFloat(it.metros) || 0;
                porArtigo[art].pecas++;
            });
            const totalGeral = Object.values(porArtigo).reduce((s,v) => s + v.metros, 0);

            const tabelaArtigos = Object.keys(porArtigo).length ? `
                <table style="width:100%;border-collapse:collapse;font-size:13px;margin-top:8px">
                    <thead><tr style="background:#f5f5f5">
                        <th style="padding:7px 10px;text-align:left;border:1px solid #e0e0e0">Artigo</th>
                        <th style="padding:7px 10px;text-align:center;border:1px solid #e0e0e0;width:80px">Peças</th>
                        <th style="padding:7px 10px;text-align:right;border:1px solid #e0e0e0;width:120px">Total Metros</th>
                    </tr></thead>
                    <tbody>
                        ${Object.entries(porArtigo).map(([art, dados]) => `
                        <tr>
                            <td style="padding:6px 10px;border:1px solid #e0e0e0;font-weight:600">${art}</td>
                            <td style="padding:6px 10px;border:1px solid #e0e0e0;text-align:center">${dados.pecas}</td>
                            <td style="padding:6px 10px;border:1px solid #e0e0e0;text-align:right">${fmtM(dados.metros)}</td>
                        </tr>`).join('')}
                    </tbody>
                    <tfoot><tr style="background:#e8f5e9;font-weight:700">
                        <td style="padding:7px 10px;border:1px solid #e0e0e0">TOTAL</td>
                        <td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:center">${itens.length}</td>
                        <td style="padding:7px 10px;border:1px solid #e0e0e0;text-align:right">${fmtM(totalGeral)}</td>
                    </tr></tfoot>
                </table>` : '<p style="color:#999;font-size:13px">Nenhum item no romaneio.</p>';

            secao.innerHTML = `<div class="card secao etapa-ativa">
                <div class="secao-titulo">⚙️ Etapa 8 — Emissão da OF (PCP)</div>
                <div class="info-resultado procedente">✅ Romaneio aprovado pelo Fiscal. Emita a Ordem de Fabricação por artigo.</div>

                <div class="campo">
                    <label>📋 Resumo por Artigo</label>
                    ${tabelaArtigos}
                </div>

                <div style="margin-top:8px">
                </div>

                <div class="campo" style="margin-top:16px">
                    <label>Número(s) da OF *</label>
                    <input type="text" id="of-numero" placeholder="Ex: OF-2024-001 ou OF-001, OF-002..." />
                </div>
                <div class="campo">
                    <label>Observações</label>
                    <textarea id="of-obs" rows="2" placeholder="Informações adicionais..."></textarea>
                </div>
            </div>`;
            rodape.style.display = 'flex';
            rodape.innerHTML = `${btn}${btnVoltarEtapa('encaminhando_devolucao_aguardando_conferencia_material', perfil)}<button class="btn btn-primary" onclick="concluirOF()">✅ Confirmar OF</button>`;
        }

        // ===== ETAPA 9: SAC — Definir forma de crédito com o cliente =====
        else if (status === 'gerando_credito_sac' && ['admin', 'sac'].includes(perfil)) {
            const valorCredito = lt.valor_credito ? parseFloat(lt.valor_credito).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—';
            secao.innerHTML = `<div class="card secao etapa-ativa">
                <div class="secao-titulo">💰 Etapa 9 — Definição de Crédito com o Cliente (SAC)</div>
                <div class="info-resultado neutro">
                    💡 Fiscal gerou crédito de <strong>R$ ${valorCredito}</strong>. Confirme com o cliente a forma de utilização.
                </div>
                <div class="campo">
                    <label>Forma de Geração do Crédito *</label>
                    <div class="radio-group" style="margin-top:8px">
                        <label class="radio-item" onclick="selecionarForma(this)">
                            <input type="radio" name="cr-forma" value="boleto_cancelado" ${lt.tipo_credito==='boleto_cancelado'?'checked':''} /> ❌ Cancelar Boleto
                        </label>
                        <label class="radio-item" onclick="selecionarForma(this)">
                            <input type="radio" name="cr-forma" value="desconto_boleto" ${lt.tipo_credito==='desconto_boleto'?'checked':''} /> 💳 Abater em Outro Boleto
                        </label>
                        <label class="radio-item" onclick="selecionarForma(this)">
                            <input type="radio" name="cr-forma" value="outro" ${lt.tipo_credito==='outro'?'checked':''} /> 📝 Outros
                        </label>
                    </div>
                </div>
                <div class="campo"><label>Contato realizado com (nome)</label>
                    <input type="text" id="cr-contato" placeholder="Nome do responsável no cliente..." value="${lt.contato_cliente||''}" />
                </div>
                <div class="campo"><label>O que foi tratado com o cliente *</label>
                    <textarea id="cr-obs-sac" rows="3" placeholder="Descreva o que foi combinado com o cliente sobre o crédito (informações para o Financeiro)...">${lt.descricao_credito||''}</textarea>
                </div>
            </div>`;
            rodape.style.display = 'flex';
            rodape.innerHTML = `${btn}<button class="btn btn-primary" onclick="encaminharCreditoFinanceiro()">✅ Encaminhar ao Financeiro</button>`;
        }

        // ===== ETAPA 10: Financeiro — Tomar ciência do crédito =====
        else if (status === 'aguardando_aprovacao_financeiro' && ['admin', 'financeiro'].includes(perfil)) {
            const valorCredito = lt.valor_credito ? parseFloat(lt.valor_credito).toLocaleString('pt-BR',{minimumFractionDigits:2}) : '—';
            const formaLabel = { boleto_cancelado: '❌ Cancelar Boleto', desconto_boleto: '💳 Abater em Outro Boleto', outro: '📝 Outros' };
            secao.innerHTML = `<div class="card secao etapa-ativa">
                <div class="secao-titulo">💰 Etapa 10 — Ciência do Crédito (Financeiro)</div>
                <div class="info-resultado neutro">
                    <strong>Valor do crédito:</strong> R$ ${valorCredito}
                    ${lt.tipo_credito ? ` — <strong>Forma:</strong> ${formaLabel[lt.tipo_credito]||lt.tipo_credito}` : ''}
                    ${lt.contato_cliente ? `<br><strong>Contato no cliente:</strong> ${lt.contato_cliente}` : ''}
                </div>
                <div class="campo"><label>Observações (opcional)</label>
                    <textarea id="cr-fin-obs" rows="2" placeholder="Observações sobre a execução do crédito..."></textarea>
                </div>
            </div>`;
            rodape.style.display = 'flex';
            rodape.innerHTML = `${btn}<button class="btn btn-primary" onclick="confirmarCienciaFinanceiro()">✅ Confirmar Ciência</button>`;
        }

        // ===== ETAPA 11: Comercial — Encerrar lote =====
        else if (status === 'aguardando_encerramento_comercial' && ['admin', 'comercial'].includes(perfil)) {
            secao.innerHTML = `<div class="card secao etapa-ativa">
                <div class="secao-titulo">🏁 Etapa 11 — Encerramento (Comercial)</div>
                <div class="campo"><label>Descrição do encerramento *</label>
                    <textarea id="enc-desc" rows="4" placeholder="Descreva como foi resolvido..."></textarea>
                </div>
            </div>`;
            rodape.style.display = 'flex';
            rodape.innerHTML = `${btn}<button class="btn btn-success" onclick="encerrarLote()">✅ Encerrar Lote</button>`;
        }

        // ===== CONCLUÍDO =====
        else if (status === 'concluido') {
            secao.innerHTML = `<div class="card secao" style="background:#e8f5e9;border:none;">
                <div class="secao-titulo">✅ Lote Concluído</div>
                <p style="color:#555;font-size:13px">Encerrado em ${fmt(lt.concluido_em || lt.atualizado_em)}.</p>
            </div>`;
            rodape.style.display = 'flex';
            rodape.innerHTML = btn;
        }

        // ===== EM ANDAMENTO (outro setor) =====
        else {
            secao.innerHTML = `<div class="card secao">
                <div class="secao-titulo">⏳ ${statusLabel[status] || status}</div>
                <p style="color:#666;font-size:13px">Esta etapa esta sendo processada por outro setor.</p>
            </div>`;
            rodape.style.display = 'flex';
            rodape.innerHTML = btn;
        }
    }

    // ===================================================
    // HELPERS — tabela NFs de despacho
    // ===================================================
    let nfContador = 0;
    let nfSaveTimer = null;

    function nfLinha(i, n) {
        return `<tr id="nf-linha-${i}">
            <td><input type="text" value="${n.numero_nf||''}" placeholder="Ex: 12345" oninput="nfRecalcular()" onblur="nfAutoSave()" /></td>
            <td><input type="number" value="${n.metragem||''}" placeholder="0,00" step="0.01" min="0" oninput="nfRecalcular()" onblur="nfAutoSave()" style="text-align:right" /></td>
            <td><input type="number" value="${n.volumes||''}" placeholder="0" min="0" oninput="nfRecalcular()" onblur="nfAutoSave()" style="text-align:right" /></td>
            <td><input type="number" value="${n.peso||''}" placeholder="0,00" step="0.01" min="0" oninput="nfRecalcular()" onblur="nfAutoSave()" style="text-align:right" /></td>
            <td><input type="number" value="${n.valor_nf||''}" placeholder="0,00" step="0.01" min="0" oninput="nfRecalcular()" onblur="nfAutoSave()" style="text-align:right" /></td>
            <td style="text-align:center"><button class="btn-del-linha" onclick="nfRemoverLinhaESalvar(${i})">✕</button></td>
        </tr>`;
    }

    function nfAddLinha() {
        const tbody = document.getElementById('nf-tbody');
        if (!tbody) return;
        const i = ++nfContador + 100;
        tbody.insertAdjacentHTML('beforeend', nfLinha(i, {}));
        // Foca no primeiro campo da nova linha
        const novaLinha = document.getElementById('nf-linha-' + i);
        if (novaLinha) novaLinha.querySelector('input')?.focus();
    }

    function nfRemoverLinhaESalvar(i) {
        const tr = document.getElementById('nf-linha-' + i);
        if (tr) { tr.remove(); nfRecalcular(); nfAutoSave(); }
    }

    // Mantida para compatibilidade mas delega para nfRemoverLinhaESalvar
    function nfRemoverLinha(i) { nfRemoverLinhaESalvar(i); }

    function nfRecalcular() {
        const tbody = document.getElementById('nf-tbody');
        if (!tbody) return;
        let totMet = 0, totVol = 0, totPeso = 0, totVal = 0;
        tbody.querySelectorAll('tr').forEach(tr => {
            const inp = tr.querySelectorAll('input');
            totMet  += parseFloat(inp[1]?.value) || 0;
            totVol  += parseInt(inp[2]?.value)   || 0;
            totPeso += parseFloat(inp[3]?.value) || 0;
            totVal  += parseFloat(inp[4]?.value) || 0;
        });
        const fmt2 = v => v.toFixed(2).replace('.', ',');
        const el = id => document.getElementById(id);
        if (el('tot-metragem')) el('tot-metragem').textContent = fmt2(totMet) + ' m';
        if (el('tot-volumes'))  el('tot-volumes').textContent  = totVol;
        if (el('tot-peso'))     el('tot-peso').textContent     = fmt2(totPeso) + ' kg';
        if (el('tot-valor'))    el('tot-valor').textContent    = 'R$ ' + fmt2(totVal);
    }

    function nfSetIndicador(txt, cor) {
        const el = document.getElementById('nf-save-status');
        if (!el) return;
        el.textContent = txt;
        el.style.color = cor;
    }

    async function nfAutoSave() {
        // Debounce: espera 600ms sem atividade antes de salvar
        clearTimeout(nfSaveTimer);
        nfSetIndicador('⏳ Salvando...', '#888');
        nfSaveTimer = setTimeout(async () => {
            const nfs = getNFsDespacho();
            const qtd = getTotalMetragem();
            const obs = document.getElementById('dv-obs')?.value.trim() || '';
            const r = await api('PUT', '/reclamacoes/lotes/' + loteId + '/dados', {
                nfs_despacho:          nfs.length ? JSON.stringify(nfs) : null,
                quantidade_confirmada: qtd || null,
                observacoes_nf:        obs || null,
            });
            if (r && r.ok) {
                nfSetIndicador('✅ Salvo', '#2e7d32');
                setTimeout(() => nfSetIndicador('', ''), 2000);
            } else {
                nfSetIndicador('⚠️ Erro ao salvar', '#c62828');
            }
        }, 600);
    }

    function getNFsDespacho() {
        const tbody = document.getElementById('nf-tbody');
        if (!tbody) return [];
        return Array.from(tbody.querySelectorAll('tr')).map(tr => {
            const inp = tr.querySelectorAll('input');
            return {
                numero_nf: inp[0]?.value.trim() || '',
                metragem:  parseFloat(inp[1]?.value) || 0,
                volumes:   parseInt(inp[2]?.value)   || 0,
                peso:      parseFloat(inp[3]?.value) || 0,
                valor_nf:  parseFloat(inp[4]?.value) || 0,
            };
        }).filter(n => n.numero_nf);
    }

    function getTotalMetragem() {
        const tbody = document.getElementById('nf-tbody');
        if (!tbody) return 0;
        let tot = 0;
        tbody.querySelectorAll('tr').forEach(tr => {
            const inp = tr.querySelectorAll('input');
            tot += parseFloat(inp[1]?.value) || 0;
        });
        return tot;
    }

    // ===================================================
    // AÇÕES — todas chamam PUT /lotes/:id/status
    // ===================================================

    async function avancarLote(novoStatus, campos) {
        const r = await api('PUT', '/reclamacoes/lotes/' + loteId + '/status', { status: novoStatus, ...campos });
        if (r.ok) window.location.reload();
        else alert((r.dados && r.dados.erro) || 'Erro ao avançar lote.');
    }

    // Botão de retroceder etapa — só para admin
    function btnVoltarEtapa(statusAnterior, perfil) {
        if (perfil !== 'admin') return '';
        return `<button class="btn btn-secondary" onclick="voltarEtapa('${statusAnterior}')"
            style="background:#fff3e0;color:#e65100;border:1px solid #ffcc80"
            title="Retroceder para etapa anterior">⬅ Voltar Etapa</button>`;
    }

    async function voltarEtapa(statusAnterior) {
        if (!confirm('Tem certeza que deseja retroceder o lote para a etapa anterior? Esta ação é irreversível.')) return;
        const r = await api('PUT', '/reclamacoes/lotes/' + loteId + '/status', { status: statusAnterior });
        if (r.ok) window.location.reload();
        else alert((r.dados && r.dados.erro) || 'Erro ao retroceder etapa.');
    }

    // Etapa 1 — SAC confirma quantidade e cotações
    async function salvarRascunhoDevolucao() {
        const nfs   = getNFsDespacho();
        const qtd   = getTotalMetragem();
        const obs   = document.getElementById('dv-obs')?.value.trim() || '';
        const r = await api('PUT', '/reclamacoes/lotes/' + loteId + '/dados', {
            quantidade_confirmada: qtd || null,
            observacoes_nf: obs,
            nfs_despacho: nfs.length ? JSON.stringify(nfs) : null,
        });
        if (r.ok) alert('Rascunho salvo!');
        else alert((r.dados && r.dados.erro) || 'Erro ao salvar rascunho.');
    }

    async function confirmarDevolucao() {
        const nfs    = getNFsDespacho();
        const qtd    = getTotalMetragem();
        const transp = document.getElementById('dv-transp')?.value;
        const obs    = document.getElementById('dv-obs')?.value.trim() || '';
        if (!nfs.length) { alert('Informe ao menos uma NF de despacho.'); return; }
        if (!qtd)        { alert('A metragem total não pode ser zero.'); return; }
        if (!transp)     { alert('Selecione a transportadora.'); return; }
        if (getCotacoes().length < 1) { alert('Adicione ao menos uma cotação.'); return; }
        await avancarLote('encaminhando_devolucao_conferindo_nf', {
            observacoes_nf:        obs,
            transportadora:        transp,
            quantidade_confirmada: qtd,
            nfs_despacho:          JSON.stringify(nfs),
        });
    }

    // Etapa 2 — Upload múltiplo de NFs de devolução do cliente
    let nfsClienteUrls = []; // array de {nome, url}

    // Inicializa lista a partir dos dados salvos no lote
    try { nfsClienteUrls = lote && lote.nfs_cliente_urls ? JSON.parse(lote.nfs_cliente_urls) : []; } catch(e) { nfsClienteUrls = []; }

    async function nfClienteUpload(input) {
        if (!input.files || !input.files.length) return;
        const primeiraRec = lote.reclamacoes && lote.reclamacoes[0];
        if (!primeiraRec) { alert('Nenhuma reclamação no lote.'); return; }
        const statusEl = document.getElementById('nfc-upload-status');
        if (statusEl) { statusEl.textContent = '⏳ Enviando...'; statusEl.style.color = '#555'; }

        for (const file of Array.from(input.files)) {
            const fd = new FormData();
            fd.append('arquivos', file);
            fd.append('etapa', 'nf_cliente');
            const resp = await fetch('/api/reclamacoes/' + primeiraRec.id + '/arquivos', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + localStorage.getItem('token') },
                body: fd
            });
            const data = await resp.json();
            const arqs = Array.isArray(data) ? data : [data];
            if (arqs.length && arqs[0].caminho) {
                nfsClienteUrls.push({ nome: file.name, url: arqs[0].caminho });
            }
        }
        input.value = '';
        nfClienteRenderLista();
        await nfClienteSalvar();
        if (statusEl) { statusEl.textContent = '✅ ' + nfsClienteUrls.length + ' NF(s) anexada(s)'; statusEl.style.color = '#2e7d32'; }
    }

    function nfClienteRenderLista() {
        const lista = document.getElementById('nfs-cliente-lista');
        if (!lista) return;
        lista.innerHTML = nfsClienteUrls.map((nf, i) => `
            <div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:#f5f5f5;border-radius:6px;font-size:13px">
                <span>📄</span>
                <a href="${nf.url}" target="_blank" style="flex:1;color:#1a237e;text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${nf.nome}</a>
                <button onclick="nfClienteRemover(${i})" style="background:none;border:none;color:#c62828;cursor:pointer;font-size:14px">✕</button>
            </div>`).join('');
    }

    async function nfClienteRemover(i) {
        nfsClienteUrls.splice(i, 1);
        nfClienteRenderLista();
        await nfClienteSalvar();
    }

    async function nfClienteSalvar() {
        await api('PUT', '/reclamacoes/lotes/' + loteId + '/dados', {
            nfs_cliente_urls: JSON.stringify(nfsClienteUrls),
        });
    }

    async function enviarNFsParaFiscal() {
        if (!nfsClienteUrls.length) { alert('Anexe ao menos uma NF de devolução do cliente.'); return; }
        const obs = document.getElementById('dv-nf-obs')?.value.trim() || '';
        await avancarLote('encaminhando_devolucao_conferindo_nf_fiscal', {
            nfs_cliente_urls: JSON.stringify(nfsClienteUrls),
            observacoes_nf: obs,
        });
    }

    // Etapa 3 — Fiscal confere NFs fiscalmente
    function fiscalToggle(ok) {
        const el = document.getElementById('fiscal-campo-problema');
        if (el) el.style.display = ok ? 'none' : 'block';
    }

    async function concluirConferenciaNF() {
        const nfOk = document.querySelector('input[name="nf-ok"]:checked')?.value;
        if (!nfOk) { alert('Selecione se as NFs estão aprovadas ou não.'); return; }
        const desc = document.getElementById('nf-descricao')?.value.trim();
        if (nfOk === 'false' && !desc) { alert('Descreva o problema fiscal encontrado.'); return; }
        const proximoStatus = nfOk === 'true'
            ? 'encaminhando_devolucao_sac_solicitar_coleta'
            : 'encaminhando_devolucao_conferindo_nf'; // volta para SAC corrigir com cliente
        await avancarLote(proximoStatus, { observacoes_nf: desc || '' });
    }

    // Etapa 4 — SAC solicita coleta (transportadora já vem da etapa 1)
    async function salvarRascunhoColeta() {
        const data    = document.getElementById('col-data')?.value;
        const chegada = document.getElementById('col-chegada')?.value;
        const obs     = document.getElementById('col-obs')?.value.trim() || '';
        const r = await api('PUT', '/reclamacoes/lotes/' + loteId + '/dados', {
            data_coleta:           data || null,
            data_prevista_chegada: chegada || null,
            observacoes_nf:        obs || null,
        });
        if (r.ok) alert('Rascunho salvo!');
        else alert((r.dados && r.dados.erro) || 'Erro ao salvar.');
    }

    async function confirmarColeta() {
        const data    = document.getElementById('col-data')?.value;
        const chegada = document.getElementById('col-chegada')?.value;
        const obs     = document.getElementById('col-obs')?.value.trim() || '';
        if (!data) { alert('Informe a data da coleta.'); return; }
        await avancarLote('encaminhando_devolucao_aguardando_chegada_material', {
            data_coleta:           data,
            data_prevista_chegada: chegada || null,
            observacoes_nf:        obs || null,
        });
    }

    // Etapa 5 — Expedição recebe material
    async function receberMaterial() {
        const data = document.getElementById('rec-data')?.value;
        if (!data) { alert('Informe a data de recebimento.'); return; }
        await avancarLote('encaminhando_devolucao_aguardando_revisao', {});
    }

    // Etapa 6 — Revisão
    let rvContador = 0;

    function rvLinha(i, it) {
        return `<tr id="rv-linha-${i}">
            <td style="text-align:center;color:#999;font-size:12px;font-weight:600" class="rv-num">—</td>
            <td><input class="form-control" id="rv-nf-${i}" value="${it.numero_nf||''}" placeholder="Nº NF" /></td>
            <td><input class="form-control" id="rv-cod-${i}" value="${it.codigo_produto||''}" placeholder="Ex: MLH004.09" /></td>
            <td><select class="form-control" id="rv-qual-${i}">
                <option value="" ${!it.qualidade?'selected':''}>—</option>
                <option value="1ª" ${it.qualidade==='1ª'?'selected':''}>1ª</option>
                <option value="2ª" ${it.qualidade==='2ª'?'selected':''}>2ª</option>
                <option value="3ª" ${it.qualidade==='3ª'?'selected':''}>3ª</option>
                <option value="Retalho" ${it.qualidade==='Retalho'?'selected':''}>Retalho</option>
            </select></td>
            <td><input class="form-control" type="number" id="rv-metros-${i}" value="${it.metros||''}" placeholder="0.00" step="0.01" style="text-align:right" /></td>
            <td style="text-align:center"><button onclick="rvRemoverLinha(${i})" style="background:none;border:none;cursor:pointer;color:#c0392b;font-size:16px">✕</button></td>
        </tr>`;
    }

    function rvRenumerar() {
        document.querySelectorAll('#rv-tbody tr').forEach((tr, idx) => {
            const num = tr.querySelector('.rv-num');
            if (num) num.textContent = idx + 1;
        });
    }

    function rvAdicionarLinha() {
        const tbody = document.getElementById('rv-tbody');
        if (!tbody) return;
        const i = ++rvContador + 100;
        tbody.insertAdjacentHTML('beforeend', rvLinha(i, {}));
        rvRenumerar();
        document.getElementById('rv-nf-' + i)?.focus();
    }

    function rvRemoverLinha(i) {
        const tr = document.getElementById(`rv-linha-${i}`);
        if (tr) { tr.remove(); rvRenumerar(); }
    }

    function rvColetarItens() {
        const itens = [];
        document.querySelectorAll('#rv-tbody tr').forEach(tr => {
            const id = tr.id.replace('rv-linha-', '');
            const cod = document.getElementById(`rv-cod-${id}`)?.value.trim();
            const nf  = document.getElementById(`rv-nf-${id}`)?.value.trim();
            if (cod || nf) itens.push({
                numero_nf:      nf  || null,
                codigo_produto: cod || null,
                qualidade:      document.getElementById(`rv-qual-${id}`)?.value || null,
                metros:         parseFloat(document.getElementById(`rv-metros-${id}`)?.value) || null,
            });
        });
        return itens;
    }

    async function salvarRascunhoRevisao() {
        const revisora  = document.getElementById('rv-revisora')?.value.trim();
        const descricao = document.getElementById('rv-descricao')?.value.trim();
        const itens     = rvColetarItens();
        const primeiraRec = lote.reclamacoes && lote.reclamacoes[0];
        if (primeiraRec) {
            const r = await api('POST', '/reclamacoes/' + primeiraRec.id + '/revisao/rascunho', { revisora, descricao, itens });
            const msg = document.getElementById('rv-msg');
            if (r.ok) { if (msg) { msg.textContent = '✅ Salvo!'; msg.style.color = '#2e7d32'; setTimeout(()=>msg.textContent='',2500); } }
            else alert((r.dados && r.dados.erro) || 'Erro ao salvar rascunho.');
        }
    }

    async function concluirRevisao() {
        const revisora  = document.getElementById('rv-revisora')?.value.trim();
        const descricao = document.getElementById('rv-descricao')?.value.trim();
        const itens     = rvColetarItens();
        if (!revisora)     { alert('Informe o nome da revisora.'); return; }
        if (!itens.length) { alert('Adicione ao menos um item no romaneio.'); return; }
        const primeiraRec = lote.reclamacoes && lote.reclamacoes[0];
        if (primeiraRec) {
            const r = await api('POST', '/reclamacoes/' + primeiraRec.id + '/revisao', { revisora, descricao, itens });
            if (!r.ok) { alert((r.dados && r.dados.erro) || 'Erro ao salvar revisão.'); return; }
        }
        await avancarLote('encaminhando_devolucao_aguardando_conferencia_material', {});
    }

    // Etapa 7 — Fiscal confere NF x Romaneio
    function toggleConfNF(ok) {
        const prob = document.getElementById('conf-campo-problema');
        if (prob) prob.style.display = ok ? 'none' : 'block';
    }
    function toggleConfNF(ok) {
        const prob = document.getElementById('conf-campo-problema');
        const cred = document.getElementById('conf-campo-credito');
        if (prob) prob.style.display = ok ? 'none' : 'block';
        if (cred) cred.style.display = ok ? 'block' : 'none';
    }

    async function concluirConferenciaMaterial() {
        const ok = document.querySelector('input[name="conf-nf"]:checked')?.value;
        if (ok === undefined || ok === null) { alert('Selecione se o material está OK ou não.'); return; }
        const romaneio_nf_ok = ok === 'true';
        if (!romaneio_nf_ok) {
            const desc = document.getElementById('conf-descricao')?.value.trim();
            if (!desc) { alert('Descreva o problema encontrado.'); return; }
            await avancarLote('encaminhando_devolucao_aguardando_correcao_nf_cliente', {
                romaneio_nf_ok: false,
                descricao_conferencia: desc,
            });
        } else {
            // Fiscal informa o valor do crédito aqui
            const valor = document.getElementById('conf-valor-credito')?.value;
            if (!valor || isNaN(parseFloat(valor)) || parseFloat(valor) <= 0) {
                alert('Informe o valor do crédito a ser gerado.'); return;
            }
            await avancarLote('encaminhando_devolucao_aguardando_of', {
                romaneio_nf_ok: true,
                valor_credito: parseFloat(valor),
            });
        }
    }

    async function concluirOF() {
        const numero = document.getElementById('of-numero')?.value.trim();
        if (!numero) { alert('Informe o número da OF.'); return; }
        const primeiraRec = lote.reclamacoes && lote.reclamacoes[0];
        if (primeiraRec) {
            const r = await api('POST', '/reclamacoes/' + primeiraRec.id + '/of', { numero_of: numero });
            if (!r.ok) { alert((r.dados && r.dados.erro) || 'Erro ao salvar OF.'); return; }
        }
        await avancarLote('gerando_credito_sac', {});
    }

    function imprimirRomaneioOF() {
        const itens = lote.romaneio_itens || [];
        if (!itens.length) { alert('Nenhum item no romaneio.'); return; }

        // Resumo por artigo/qualidade
        const porArtigo = {};
        itens.forEach(it => {
            const art  = it.codigo_produto || '(sem artigo)';
            const qual = it.qualidade || '—';
            const m    = parseFloat(it.metros) || 0;
            if (!porArtigo[art]) porArtigo[art] = {};
            if (!porArtigo[art][qual]) porArtigo[art][qual] = { metros: 0, totalPecas: 0 };
            porArtigo[art][qual].metros += m;
            porArtigo[art][qual].totalPecas++;
        });

        const totalGeral = itens.reduce((s,it) => s + (parseFloat(it.metros)||0), 0);
        const dataHoje   = new Date().toLocaleDateString('pt-BR');
        const loteCodigo = 'LOTE-' + String(lote.codigo).padStart(6,'0');
        const nfOf       = document.getElementById('of-numero')?.value.trim() || '(ainda não informada)';
        const fmtN       = v => parseFloat(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});

        // Tabela resumo
        let linhasResumo = '';
        Object.entries(porArtigo).forEach(([art, quals]) => {
            Object.entries(quals).forEach(([qual, dados]) => {
                linhasResumo += `<tr>
                    <td style="padding:7px 10px;border:1px solid #ccc;font-weight:600">${art}</td>
                    <td style="padding:7px 10px;border:1px solid #ccc;text-align:center">${qual}</td>
                    <td style="padding:7px 10px;border:1px solid #ccc;text-align:center">${dados.totalPecas}</td>
                    <td style="padding:7px 10px;border:1px solid #ccc;text-align:right">${fmtN(dados.metros)} m</td>
                </tr>`;
            });
        });

        // Tabela detalhada peça a peça (ordenada por artigo)
        const itensSorted = [...itens].sort((a,b) => (a.codigo_produto||'').localeCompare(b.codigo_produto||''));
        let linhasPecas = '';
        itensSorted.forEach((it, idx) => {
            linhasPecas += `<tr>
                <td style="padding:6px 10px;border:1px solid #ccc;text-align:center;font-weight:700;color:#1a237e">${idx+1}</td>
                <td style="padding:6px 10px;border:1px solid #ccc;font-weight:600">${it.codigo_produto||'—'}</td>
                <td style="padding:6px 10px;border:1px solid #ccc;text-align:center">${it.qualidade||'—'}</td>
                <td style="padding:6px 10px;border:1px solid #ccc;text-align:right">${fmtN(it.metros)} m</td>
                <td style="padding:6px 10px;border:1px solid #ccc;text-align:center;color:#999;font-size:11px">_________</td>
            </tr>`;
        });

        const html = `<!DOCTYPE html><html><head><meta charset="utf-8">
        <title>Romaneio OF — ${loteCodigo}</title>
        <style>
            body { font-family: Arial, sans-serif; font-size: 13px; color: #222; margin: 24px; }
            h2 { font-size: 17px; margin-bottom: 2px; }
            h3 { font-size: 13px; margin: 20px 0 6px; color: #444; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
            .info { margin-bottom: 12px; color: #555; font-size: 12px; }
            table { width: 100%; border-collapse: collapse; }
            thead tr { background: #f0f0f0; }
            th { padding: 8px 10px; border: 1px solid #ccc; text-align: left; font-size: 12px; }
            tfoot tr { background: #d4edda; font-weight: 700; }
            @media print { body { margin: 10px; } }
        </style>
        </head><body>
        <h2>🏭 Romaneio para Revisão / Etiquetagem</h2>
        <div class="info">
            <strong>Lote:</strong> ${loteCodigo} &nbsp;|&nbsp;
            <strong>OF:</strong> ${nfOf} &nbsp;|&nbsp;
            <strong>Data:</strong> ${dataHoje} &nbsp;|&nbsp;
            <strong>Total de peças:</strong> ${itens.length} &nbsp;|&nbsp;
            <strong>Total metros:</strong> ${fmtN(totalGeral)} m
        </div>

        <h3>Resumo por Artigo</h3>
        <table>
            <thead><tr>
                <th>Artigo</th>
                <th style="width:110px;text-align:center">Qualidade</th>
                <th style="width:70px;text-align:center">Peças</th>
                <th style="width:120px;text-align:right">Metros</th>
            </tr></thead>
            <tbody>${linhasResumo}</tbody>
            <tfoot><tr>
                <td colspan="2" style="padding:7px 10px;border:1px solid #ccc">TOTAL</td>
                <td style="padding:7px 10px;border:1px solid #ccc;text-align:center">${itens.length}</td>
                <td style="padding:7px 10px;border:1px solid #ccc;text-align:right">${fmtN(totalGeral)} m</td>
            </tr></tfoot>
        </table>

        <h3>Ordem das Peças (para etiquetagem)</h3>
        <table>
            <thead><tr>
                <th style="width:40px;text-align:center">#</th>
                <th>Artigo</th>
                <th style="width:110px;text-align:center">Qualidade</th>
                <th style="width:120px;text-align:right">Metros</th>
                <th style="width:110px;text-align:center">Etiqueta OK</th>
            </tr></thead>
            <tbody>${linhasPecas}</tbody>
        </table>
        <p style="margin-top:24px;font-size:11px;color:#999">Gerado pelo SIGRA em ${dataHoje}</p>
        <script>window.onload = () => { window.print(); }<\/script>
        </body></html>`;

        const w = window.open('', '_blank');
        w.document.write(html);
        w.document.close();
    }

    // Etapa 9 — SAC define forma de crédito
    function selecionarForma(el) {
        document.querySelectorAll('.radio-item').forEach(r => r.classList.remove('selecionado'));
        el.classList.add('selecionado');
    }

    async function encaminharCreditoFinanceiro() {
        const tipo_credito = document.querySelector('input[name="cr-forma"]:checked')?.value;
        if (!tipo_credito) { alert('Selecione a forma de crédito.'); return; }
        const descricao_credito = document.getElementById('cr-obs-sac')?.value.trim() || '';
        if (!descricao_credito) { alert('Descreva o que foi tratado com o cliente.'); return; }
        const contato_cliente = document.getElementById('cr-contato')?.value.trim() || '';
        await avancarLote('aguardando_aprovacao_financeiro', {
            tipo_credito,
            contato_cliente:   contato_cliente || null,
            descricao_credito: descricao_credito,
        });
    }

    // Etapa 9 — Financeiro toma ciência
    async function confirmarCienciaFinanceiro() {
        const obs = document.getElementById('cr-fin-obs')?.value.trim() || '';
        await avancarLote('aguardando_encerramento_comercial', {
            observacoes_nf: obs || null,
        });
    }

    // Etapa 10 — Comercial encerra o lote
    async function encerrarLote() {
        const descricao = document.getElementById('enc-desc')?.value.trim();
        if (!descricao) { alert('Informe a descrição do encerramento.'); return; }
        // Encerra cada reclamação do lote individualmente
        const primeiraRec = lote.reclamacoes && lote.reclamacoes[0];
        if (primeiraRec) {
            const r = await api('POST', '/reclamacoes/' + primeiraRec.id + '/encerrar', { descricao });
            if (!r.ok) { alert((r.dados && r.dados.erro) || 'Erro ao encerrar.'); return; }
        }
        // Marca o lote como concluído
        await avancarLote('concluido', {});
    }

    // Etapa 7b — SAC reenviar para conferência
    async function reenviarParaConferencia() {
        const obs = document.getElementById('div-obs')?.value.trim();
        if (!obs) { alert('Descreva o alinhamento com o cliente.'); return; }
        await avancarLote('encaminhando_devolucao_aguardando_conferencia_material', {
            observacoes_nf: obs,
        });
    }

    // ===================================================
    // HELPERS — cotações
    // ===================================================
    function buildCotacoesLinhas(cotacoes) {
        if (!cotacoes || !cotacoes.length) return '';
        return cotacoes.map(co =>
            `<tr><td><input type="text" value="${co.transportadora || ''}" placeholder="Transportadora..." oninput="atualizarSelectTransp()" style="width:100%" /></td>` +
            `<td><input type="number" value="${co.valor || ''}" placeholder="0,00" step="0.01" oninput="atualizarSelectTransp()" style="width:100%" /></td>` +
            `<td><button type="button" onclick="removerLinhaCotacao(this)" style="background:none;border:none;cursor:pointer;color:#c62828">✕</button></td></tr>`
        ).join('');
    }

    function addLinhaCotacao() {
        const tbody = document.getElementById('dv-cotacoes-linhas');
        if (!tbody) return;
        const tr = document.createElement('tr');
        tr.innerHTML = '<td><input type="text" placeholder="Transportadora..." oninput="atualizarSelectTransp()" style="width:100%" /></td>' +
            '<td><input type="number" placeholder="0,00" step="0.01" oninput="atualizarSelectTransp()" style="width:100%" /></td>' +
            '<td><button type="button" onclick="removerLinhaCotacao(this)" style="background:none;border:none;cursor:pointer;color:#c62828">✕</button></td>';
        tbody.appendChild(tr);
    }

    function getCotacoes() {
        const tbody = document.getElementById('dv-cotacoes-linhas');
        if (!tbody) return [];
        return Array.from(tbody.rows).map(tr => {
            const inp = tr.querySelectorAll('input');
            return { transportadora: inp[0]?.value || '', valor: inp[1]?.value || '' };
        }).filter(c => c.transportadora);
    }

    function removerLinhaCotacao(btn) {
        btn.closest('tr').remove();
        atualizarSelectTransp();
    }

    function atualizarSelectTransp() {
        const sel = document.getElementById('dv-transp');
        if (!sel || sel.tagName !== 'SELECT') return;
        const cots = getCotacoes(), atual = sel.value;
        sel.innerHTML = '<option value="">Selecione apos cotar...</option>' +
            cots.map(c => `<option value="${c.transportadora}" ${atual === c.transportadora ? 'selected' : ''}>${c.transportadora}${c.valor ? ' — R$ ' + parseFloat(c.valor).toFixed(2).replace('.', ',') : ''}</option>`).join('');
    }

    // ===== CHAT DE DÚVIDAS AO SAC =====
    // O lote usa a primeira reclamação vinculada como referência para o chat
    function chatRecId() {
        return lote && lote.reclamacoes && lote.reclamacoes[0]?.id;
    }

    async function chatCarregar() {
        const recId = chatRecId();
        if (!recId) return;
        const r = await api('GET', '/reclamacoes/' + recId + '/duvidas');
        if (!r.ok) return;
        const msgs = r.dados.dados || r.dados || [];
        const usuario = getUsuario();
        const container = document.getElementById('chat-msgs');
        if (!container) return;
        if (!msgs.length) {
            container.innerHTML = '<p style="color:#999;font-size:13px;text-align:center">Nenhuma mensagem ainda.<br><small>Use o campo abaixo para enviar uma dúvida ao SAC.</small></p>';
            return;
        }
        container.innerHTML = msgs.map(m => {
            const ehMinha = m.usuario_id === usuario.id;
            const ehSac   = m.eh_resposta_sac;
            const cls     = ehMinha ? 'minha' : (ehSac ? 'sac' : 'deles');
            const hora    = new Date(m.criado_em).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
            return `<div class="chat-msg ${cls}">
                <div class="chat-balao">${m.mensagem.replace(/\n/g,'<br>')}</div>
                <div class="chat-meta">${m.autor_nome||'—'} · ${hora}</div>
            </div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }

    async function chatEnviar() {
        const recId = chatRecId();
        if (!recId) { alert('Nenhuma reclamação vinculada ao lote.'); return; }
        const texto = document.getElementById('chat-texto')?.value.trim();
        if (!texto) return;
        const btn = document.querySelector('#bloco-chat button');
        if (btn) btn.disabled = true;
        const r = await api('POST', '/reclamacoes/' + recId + '/duvidas', { mensagem: texto });
        if (btn) btn.disabled = false;
        if (!r.ok) { alert(r.dados?.erro || 'Erro ao enviar mensagem.'); return; }
        document.getElementById('chat-texto').value = '';
        await chatCarregar();
        // Se status mudou, recarrega o lote
        await carregar();
    }

    carregar();
</script>
</body>
</html>
