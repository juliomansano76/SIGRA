<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Meu Perfil — SIGRA</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .perfil-card {
            max-width: 480px;
            margin: 0 auto;
        }
        .avatar-grande {
            width: 80px; height: 80px; border-radius: 50%;
            background: #2c2c2c; color: white;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; font-weight: 700;
            margin: 0 auto 20px;
        }
        .perfil-info { text-align: center; margin-bottom: 32px; }
        .perfil-info h3 { font-size: 20px; color: #1a1a1a; margin-bottom: 4px; }
        .perfil-info span { font-size: 13px; color: #888; text-transform: capitalize; }
        .secao-titulo {
            font-size: 12px; font-weight: 700; color: #aaa;
            text-transform: uppercase; letter-spacing: .5px;
            margin: 24px 0 12px; border-bottom: 1px solid #f0f0f0; padding-bottom: 6px;
        }
        .inline-alerta { font-size:13px; padding:10px 14px; border-radius:8px; margin-top:12px; display:none; }
        .inline-alerta.erro    { background:#ffebee; color:#c62828; display:block; }
        .inline-alerta.sucesso { background:#e8f5e9; color:#2e7d32; display:block; }
    </style>
</head>
<body>
<div class="layout">
    <div id="sidebar-container"></div>
    <div class="conteudo">
        <h2 class="pagina-titulo">Meu Perfil</h2>

        <div class="perfil-card">
            <div class="card">
                <div id="avatar-grande" class="avatar-grande">?</div>
                <div class="perfil-info">
                    <h3 id="perfil-nome">—</h3>
                    <span id="perfil-cargo">—</span><br>
                    <span id="perfil-email" style="font-size:13px;color:#aaa;">—</span>
                </div>

                <div class="secao-titulo">Dados Pessoais</div>
                <div class="campo">
                    <label>Nome</label>
                    <input type="text" id="nome" />
                </div>
                <div class="campo">
                    <label>E-mail</label>
                    <input type="email" id="email" disabled style="background:#f5f5f5;color:#999;" />
                </div>
                <div id="alerta-dados" class="inline-alerta"></div>
                <div style="display:flex;justify-content:flex-end;margin-top:8px;">
                    <button class="btn btn-primary" style="width:auto;padding:10px 24px;" onclick="salvarDados()">Salvar Dados</button>
                </div>

                <div class="secao-titulo">Alterar Senha</div>
                <p style="font-size:13px;color:#999;margin-bottom:12px;">Deixe em branco para manter a senha atual.</p>
                <div class="campo">
                    <label>Nova Senha</label>
                    <input type="password" id="senha-nova" placeholder="Mínimo 6 caracteres" />
                </div>
                <div class="campo">
                    <label>Confirmar Nova Senha</label>
                    <input type="password" id="senha-confirma" placeholder="Repita a nova senha" />
                </div>
                <div id="alerta-senha" class="inline-alerta"></div>
                <div style="display:flex;justify-content:flex-end;margin-top:8px;">
                    <button class="btn btn-primary" style="width:auto;padding:10px 24px;" onclick="salvarSenha()">Alterar Senha</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
    carregarSidebar();
    const usuario = getUsuario();
    if (!usuario) { window.location.href = '/index.html'; }

    // Preencher dados
    const iniciais = usuario.nome.split(' ').map(p=>p[0]).join('').substring(0,2).toUpperCase();
    document.getElementById('avatar-grande').textContent = iniciais;
    document.getElementById('perfil-nome').textContent   = usuario.nome;
    document.getElementById('perfil-cargo').textContent  = usuario.perfil.charAt(0).toUpperCase() + usuario.perfil.slice(1);
    document.getElementById('perfil-email').textContent  = usuario.email;
    document.getElementById('nome').value  = usuario.nome;
    document.getElementById('email').value = usuario.email;

    function mostrarAlerta(id, msg, tipo) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.className = 'inline-alerta ' + tipo;
        setTimeout(() => { el.className = 'inline-alerta'; }, 4000);
    }

    async function salvarDados() {
        const nome = document.getElementById('nome').value.trim();
        if (!nome) { mostrarAlerta('alerta-dados', 'Nome é obrigatório.', 'erro'); return; }
        const r = await api('PUT', '/usuarios/meu-perfil', { nome });
        if (r && r.ok) {
            // Atualiza sessão local
            const u = getUsuario();
            u.nome = r.dados.nome || nome;
            salvarSessao(localStorage.getItem('token'), u);
            document.getElementById('perfil-nome').textContent = u.nome;
            carregarSidebar();
            mostrarAlerta('alerta-dados', 'Dados atualizados com sucesso!', 'sucesso');
        } else {
            mostrarAlerta('alerta-dados', r?.dados?.erro || 'Erro ao salvar.', 'erro');
        }
    }

    async function salvarSenha() {
        const nova     = document.getElementById('senha-nova').value;
        const confirma = document.getElementById('senha-confirma').value;
        if (!nova && !confirma) { mostrarAlerta('alerta-senha', 'Digite a nova senha.', 'erro'); return; }
        if (nova.length < 6)    { mostrarAlerta('alerta-senha', 'A senha deve ter pelo menos 6 caracteres.', 'erro'); return; }
        if (nova !== confirma)  { mostrarAlerta('alerta-senha', 'As senhas não coincidem.', 'erro'); return; }
        const r = await api('PUT', '/usuarios/meu-perfil', { nome: document.getElementById('nome').value.trim(), senha_nova: nova });
        if (r && r.ok) {
            document.getElementById('senha-nova').value = '';
            document.getElementById('senha-confirma').value = '';
            mostrarAlerta('alerta-senha', 'Senha alterada com sucesso!', 'sucesso');
        } else {
            mostrarAlerta('alerta-senha', r?.dados?.erro || 'Erro ao alterar senha.', 'erro');
        }
    }
</script>
</body>
</html>
