<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Clientes — SIGRA</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .clientes-page { padding: 32px 36px; }

        /* ── Header ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 28px;
        }
        .page-header-left h2 {
            font-family: 'DM Sans', sans-serif;
            font-size: 26px;
            font-weight: 600;
            color: #1a237e;
            margin: 0 0 4px;
            letter-spacing: -0.3px;
        }
        .page-header-left p {
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: #888;
            margin: 0;
        }
        .btn-novo {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #1a237e;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 11px 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
            box-shadow: 0 2px 8px rgba(26,35,126,0.18);
        }
        .btn-novo:hover { background: #283593; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(26,35,126,0.24); }
        .btn-novo:active { transform: translateY(0); }
        .btn-novo svg { width: 16px; height: 16px; }

        /* ── Busca ── */
        .barra-busca {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            padding: 0 16px;
            margin-bottom: 18px;
            transition: border 0.18s, box-shadow 0.18s;
            max-width: 380px;
        }
        .barra-busca:focus-within { border-color: #3949ab; box-shadow: 0 0 0 3px rgba(57,73,171,0.1); }
        .barra-busca svg { color: #aaa; width: 16px; flex-shrink: 0; }
        .barra-busca input {
            border: none;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: #333;
            padding: 11px 0;
            width: 100%;
            background: transparent;
        }
        .barra-busca input::placeholder { color: #bbb; }

        /* ── Cards de clientes ── */
        .clientes-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 16px;
        }
        .cliente-card {
            background: #fff;
            border: 1.5px solid #eee;
            border-radius: 14px;
            padding: 20px 22px;
            transition: border-color 0.18s, box-shadow 0.18s, transform 0.15s;
            position: relative;
            overflow: hidden;
        }
        .cliente-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: #1a237e;
            border-radius: 14px 0 0 14px;
            opacity: 0;
            transition: opacity 0.18s;
        }
        .cliente-card:hover { border-color: #c5cae9; box-shadow: 0 4px 20px rgba(26,35,126,0.08); transform: translateY(-2px); }
        .cliente-card:hover::before { opacity: 1; }
        .cliente-card.inativo { opacity: 0.55; }
        .cliente-card.inativo::before { background: #999; }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 14px;
        }
        .cliente-avatar {
            width: 42px; height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, #e8eaf6, #c5cae9);
            display: flex; align-items: center; justify-content: center;
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #3949ab;
            flex-shrink: 0;
            letter-spacing: -0.5px;
        }
        .badge-status {
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }
        .badge-ativo { background: #e8f5e9; color: #2e7d32; }
        .badge-inativo { background: #fce4ec; color: #c62828; }

        .cliente-nome {
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #1a1a2e;
            margin: 0 0 4px;
            line-height: 1.3;
        }
        .cliente-cnpj {
            font-family: 'DM Mono', monospace;
            font-size: 11.5px;
            color: #888;
            margin: 0 0 14px;
        }

        .cliente-infos {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 18px;
        }
        .info-linha {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: #555;
        }
        .info-linha svg { width: 13px; height: 13px; color: #aaa; flex-shrink: 0; }
        .info-linha span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .info-linha .vazio { color: #ccc; font-style: italic; }

        .card-acoes {
            display: flex;
            gap: 8px;
            border-top: 1px solid #f0f0f0;
            padding-top: 14px;
        }
        .btn-acao {
            flex: 1;
            border: none;
            border-radius: 8px;
            padding: 8px 0;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .btn-acao:active { transform: scale(0.97); }
        .btn-editar { background: #f0f2ff; color: #3949ab; }
        .btn-editar:hover { background: #e8eaf6; }
        .btn-inativar { background: #fff0f0; color: #c62828; }
        .btn-inativar:hover { background: #fce4ec; }
        .btn-reativar { background: #f0faf0; color: #2e7d32; }
        .btn-reativar:hover { background: #e8f5e9; }

        /* ── Estado vazio ── */
        .estado-vazio {
            text-align: center;
            padding: 64px 32px;
            color: #bbb;
            grid-column: 1 / -1;
        }
        .estado-vazio svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.4; }
        .estado-vazio p { font-family: 'DM Sans', sans-serif; font-size: 15px; margin: 0; }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.aberto { display: flex; }
        .modal-box {
            background: #fff;
            border-radius: 18px;
            width: 100%;
            max-width: 480px;
            padding: 32px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.18);
            animation: slideUp 0.22s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .modal-titulo {
            font-family: 'DM Sans', sans-serif;
            font-size: 19px;
            font-weight: 700;
            color: #1a237e;
            margin: 0 0 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-titulo svg { width: 22px; height: 22px; }
        .modal-campo { margin-bottom: 16px; }
        .modal-campo label {
            display: block;
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 600;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .modal-campo label .obrig { color: #e53935; margin-left: 2px; }
        .modal-campo input {
            width: 100%;
            border: 1.5px solid #e0e0e0;
            border-radius: 9px;
            padding: 10px 13px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            color: #333;
            outline: none;
            transition: border 0.18s, box-shadow 0.18s;
            box-sizing: border-box;
        }
        .modal-campo input:focus { border-color: #3949ab; box-shadow: 0 0 0 3px rgba(57,73,171,0.1); }
        .modal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 16px; }

        .modal-alerta {
            background: #fff3f3;
            border: 1px solid #ffcdd2;
            border-radius: 8px;
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            color: #c62828;
            margin-bottom: 16px;
            display: none;
        }
        .modal-alerta.visivel { display: block; }
        .modal-rodape {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }
        .btn-cancelar {
            background: #f5f5f5;
            color: #666;
            border: none;
            border-radius: 9px;
            padding: 10px 20px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .btn-cancelar:hover { background: #eee; }
        .btn-salvar {
            background: #1a237e;
            color: #fff;
            border: none;
            border-radius: 9px;
            padding: 10px 24px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s, box-shadow 0.15s;
            box-shadow: 0 2px 8px rgba(26,35,126,0.2);
        }
        .btn-salvar:hover { background: #283593; }
    </style>
</head>
<body>
<div class="layout">
    <div id="sidebar-container"></div>
    <div class="conteudo clientes-page">

        <div class="page-header">
            <div class="page-header-left">
                <h2>Clientes</h2>
                <p id="subtitulo-count">Carregando...</p>
            </div>
            <button class="btn-novo" onclick="abrirModal()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Novo Cliente
            </button>
        </div>

        <div class="barra-busca">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="busca" placeholder="Buscar por nome, CNPJ ou e-mail..." oninput="filtrar()">
        </div>

        <div class="clientes-grid" id="clientes-grid">
            <div class="estado-vazio">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <p>Carregando clientes...</p>
            </div>
        </div>

    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
    <div class="modal-box">
        <div class="modal-titulo" id="modal-titulo-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span id="modal-titulo">Novo Cliente</span>
        </div>

        <input type="hidden" id="cliente-id" />

        <div class="modal-campo">
            <label>Nome <span class="obrig">*</span></label>
            <input type="text" id="nome" placeholder="Razão social ou nome completo" />
        </div>
        <div class="modal-campo">
            <label>CNPJ / CPF</label>
            <input type="text" id="cnpj_cpf" placeholder="00.000.000/0000-00" />
        </div>
        <div class="modal-grid">
            <div class="modal-campo">
                <label>Contato</label>
                <input type="text" id="contato" placeholder="Nome do contato" />
            </div>
            <div class="modal-campo">
                <label>Telefone</label>
                <input type="text" id="telefone" placeholder="(00) 00000-0000" />
            </div>
        </div>
        <div class="modal-campo">
            <label>E-mail</label>
            <input type="email" id="email" placeholder="contato@empresa.com.br" />
        </div>

        <div class="modal-alerta" id="modal-alerta"></div>

        <div class="modal-rodape">
            <button class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
            <button class="btn-salvar" onclick="salvar()">Salvar Cliente</button>
        </div>
    </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/sidebar.js"></script>
<script>
    carregarSidebar();

    let todosClientes = [];

    function iniciais(nome) {
        const partes = nome.trim().split(' ').filter(Boolean);
        if (partes.length === 1) return partes[0][0].toUpperCase();
        return (partes[0][0] + partes[partes.length - 1][0]).toUpperCase();
    }

    function renderCard(c) {
        return `
        <div class="cliente-card ${!c.ativo ? 'inativo' : ''}" id="card-${c.id}">
            <div class="card-top">
                <div class="cliente-avatar">${iniciais(c.nome)}</div>
                <span class="badge-status ${c.ativo ? 'badge-ativo' : 'badge-inativo'}">${c.ativo ? 'Ativo' : 'Inativo'}</span>
            </div>
            <p class="cliente-nome">${c.nome}</p>
            <p class="cliente-cnpj">${c.cnpj_cpf || '—'}</p>
            <div class="cliente-infos">
                <div class="info-linha">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    <span ${!c.contato ? 'class="vazio"' : ''}>${c.contato || 'Sem contato'}</span>
                </div>
                <div class="info-linha">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <span ${!c.email ? 'class="vazio"' : ''}>${c.email || 'Sem e-mail'}</span>
                </div>
                <div class="info-linha">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.8a16 16 0 0 0 6 6l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16z"/></svg>
                    <span ${!c.telefone ? 'class="vazio"' : ''}>${c.telefone || 'Sem telefone'}</span>
                </div>
            </div>
            <div class="card-acoes">
                <button class="btn-acao btn-editar" onclick="editar('${c.id}','${(c.nome||'').replace(/'/g,"\\'")}','${(c.cnpj_cpf||'').replace(/'/g,"\\'")}','${(c.contato||'').replace(/'/g,"\\'")}','${(c.email||'').replace(/'/g,"\\'")}','${(c.telefone||'').replace(/'/g,"\\'")}')">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                    Editar
                </button>
                <button class="btn-acao ${c.ativo ? 'btn-inativar' : 'btn-reativar'}" onclick="alterarStatus('${c.id}','${(c.nome||'').replace(/'/g,"\\'")}',${c.ativo})">
                    ${c.ativo
                        ? `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Inativar`
                        : `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Reativar`
                    }
                </button>
            </div>
        </div>`;
    }

    async function carregar() {
        const r = await api('GET', '/clientes');
        const grid = document.getElementById('clientes-grid');
        if (!r.ok || !r.dados.length) {
            grid.innerHTML = `<div class="estado-vazio">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                <p>Nenhum cliente cadastrado.</p>
            </div>`;
            document.getElementById('subtitulo-count').textContent = '0 clientes';
            return;
        }
        todosClientes = r.dados;
        renderLista(todosClientes);
    }

    function renderLista(lista) {
        const grid = document.getElementById('clientes-grid');
        const ativos   = lista.filter(c => c.ativo).length;
        const inativos = lista.filter(c => !c.ativo).length;
        document.getElementById('subtitulo-count').textContent =
            `${lista.length} cliente${lista.length !== 1 ? 's' : ''} · ${ativos} ativo${ativos !== 1 ? 's' : ''}${inativos ? ' · ' + inativos + ' inativo' + (inativos !== 1 ? 's' : '') : ''}`;

        if (!lista.length) {
            grid.innerHTML = `<div class="estado-vazio">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <p>Nenhum cliente encontrado.</p>
            </div>`;
            return;
        }
        grid.innerHTML = lista.map(renderCard).join('');
    }

    function filtrar() {
        const q = document.getElementById('busca').value.toLowerCase().trim();
        if (!q) { renderLista(todosClientes); return; }
        renderLista(todosClientes.filter(c =>
            (c.nome || '').toLowerCase().includes(q) ||
            (c.cnpj_cpf || '').toLowerCase().includes(q) ||
            (c.email || '').toLowerCase().includes(q) ||
            (c.contato || '').toLowerCase().includes(q)
        ));
    }

    function abrirModal() {
        document.getElementById('modal-titulo').textContent = 'Novo Cliente';
        document.getElementById('cliente-id').value = '';
        ['nome','cnpj_cpf','contato','email','telefone'].forEach(id => document.getElementById(id).value = '');
        document.getElementById('modal-alerta').classList.remove('visivel');
        document.getElementById('modal').classList.add('aberto');
        setTimeout(() => document.getElementById('nome').focus(), 80);
    }

    function editar(id, nome, cnpj_cpf, contato, email, telefone) {
        document.getElementById('modal-titulo').textContent = 'Editar Cliente';
        document.getElementById('cliente-id').value = id;
        document.getElementById('nome').value = nome;
        document.getElementById('cnpj_cpf').value = cnpj_cpf;
        document.getElementById('contato').value = contato;
        document.getElementById('email').value = email;
        document.getElementById('telefone').value = telefone;
        document.getElementById('modal-alerta').classList.remove('visivel');
        document.getElementById('modal').classList.add('aberto');
    }

    function fecharModal() { document.getElementById('modal').classList.remove('aberto'); }

    // Fechar modal clicando fora
    document.getElementById('modal').addEventListener('click', function(e) {
        if (e.target === this) fecharModal();
    });

    async function alterarStatus(id, nome, ativo) {
        const acao = ativo ? 'inativar' : 'reativar';
        if (!confirm(`Deseja ${acao} o cliente "${nome}"?`)) return;
        const r = ativo
            ? await api('DELETE', '/clientes/' + id)
            : await api('PUT', '/clientes/' + id + '/reativar');
        if (r.ok) carregar();
        else alert('Erro ao alterar status.');
    }

    async function salvar() {
        const id    = document.getElementById('cliente-id').value;
        const corpo = {
            nome:     document.getElementById('nome').value.trim(),
            cnpj_cpf: document.getElementById('cnpj_cpf').value.trim(),
            contato:  document.getElementById('contato').value.trim(),
            email:    document.getElementById('email').value.trim(),
            telefone: document.getElementById('telefone').value.trim(),
        };
        const alerta = document.getElementById('modal-alerta');
        if (!corpo.nome) {
            alerta.textContent = '⚠️  O nome do cliente é obrigatório.';
            alerta.classList.add('visivel');
            document.getElementById('nome').focus();
            return;
        }
        const r = id ? await api('PUT', '/clientes/' + id, corpo) : await api('POST', '/clientes', corpo);
        if (r.ok) { fecharModal(); carregar(); }
        else { alerta.textContent = '⚠️  ' + (r.dados?.erro || 'Erro ao salvar.'); alerta.classList.add('visivel'); }
    }

    // Enter no modal salva
    document.getElementById('modal').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) salvar();
        if (e.key === 'Escape') fecharModal();
    });

    carregar();
</script>
</body>
</html>
